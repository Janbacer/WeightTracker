<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Weight">
<title>Weight Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d0f14;
  --bg2:    #161920;
  --bg3:    #1e2230;
  --card:   #1a1d27;
  --border: rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --text:   #eef0f6;
  --text2:  #7a7f96;
  --text3:  #454a60;
  --mint:   #00e5a0;
  --mint2:  #00c488;
  --red:    #ff5c6c;
  --amber:  #ffb340;
  --blue:   #4d9fff;
  --glow:   0 0 24px rgba(0,229,160,.15);
  --r:      14px;
  --rs:     10px;
  --sb:     env(safe-area-inset-bottom,0px);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; }

/* ── Layout ────────────────────────────────────────────────────────── */
#app { display:flex; flex-direction:column; height:100%; max-width:480px; margin:0 auto; }

/* ── Header ─────────────────────────────────────────────────────────── */
.hdr {
  padding: 20px 22px 0;
  padding-top: calc(20px + env(safe-area-inset-top,0px));
  display: flex; justify-content:space-between; align-items:flex-start;
}
.hdr-left h1 { font-size:24px; font-weight:700; letter-spacing:-.5px; }
.hdr-left p  { font-size:13px; color:var(--text2); margin-top:3px; font-weight:300; }


/* ── Tabs ────────────────────────────────────────────────────────────── */
.tabs {
  display:flex; gap:4px;
  margin:16px 22px 0;
  background:var(--bg2);
  border-radius:var(--rs); padding:4px;
}
.tabs button {
  flex:1; padding:8px 0; background:none; border:none;
  color:var(--text2); font-size:13px; font-weight:500;
  font-family:'Outfit',sans-serif; cursor:pointer;
  border-radius:7px; transition:all .2s;
}
.tabs button.on {
  background:var(--bg3); color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,.4);
}

/* ── Content ─────────────────────────────────────────────────────────── */
.cnt { flex:1; overflow-y:auto; padding:16px 22px; padding-bottom:calc(24px + var(--sb)); }
.scr { display:none; } .scr.on { display:block; }

/* ── Height bar ──────────────────────────────────────────────────────── */
.ht-bar {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--rs); padding:11px 14px; margin-bottom:12px; font-size:13px;
}
.ht-bar span { color:var(--text2); }
.ht-bar input {
  width:60px; font-size:13px; padding:5px 8px;
  border-radius:7px; border:1px solid var(--border2);
  background:var(--bg3); color:var(--text); outline:none;
  font-family:'Outfit',sans-serif; margin-right:8px; text-align:center;
}
.ht-bar button {
  font-size:12px; font-weight:600; color:var(--mint);
  background:none; border:none; cursor:pointer; font-family:'Outfit',sans-serif;
}

/* ── Gemini key ──────────────────────────────────────────────────────── */
.api-box {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--rs); margin-bottom:12px; overflow:hidden;
}
.api-box summary {
  padding:11px 14px; cursor:pointer; color:var(--text2);
  font-size:13px; user-select:none; list-style:none;
  display:flex; justify-content:space-between; align-items:center;
}
.api-box summary::-webkit-details-marker { display:none; }
.api-box .inner { padding:0 14px 14px; display:flex; flex-direction:column; gap:8px; }
.api-box input {
  font-size:13px; padding:9px 11px; border-radius:7px;
  border:1px solid var(--border2); background:var(--bg3);
  color:var(--text); width:100%; outline:none; font-family:monospace;
}
.api-box input:focus { border-color:var(--mint); }
.api-box p { font-size:11px; color:var(--text3); line-height:1.6; }

/* ── Photo button ────────────────────────────────────────────────────── */
.photo-btn {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; padding:22px;
  border:1.5px dashed rgba(0,229,160,.3);
  border-radius:var(--r); background:rgba(0,229,160,.04);
  cursor:pointer; margin-bottom:12px; position:relative;
  transition:all .2s;
}
.photo-btn:active { background:rgba(0,229,160,.08); }
.photo-btn input { position:absolute; inset:0; opacity:0; cursor:pointer; font-size:0; }
.photo-btn-icon { font-size:28px; }
.photo-btn-text { display:flex; flex-direction:column; gap:2px; }
.photo-btn-text strong { font-size:15px; font-weight:600; color:var(--text); }
.photo-btn-text span { font-size:12px; color:var(--text2); font-weight:300; }

/* ── Status ──────────────────────────────────────────────────────────── */
.st {
  font-size:13px; text-align:center; padding:10px 14px;
  border-radius:var(--rs); margin-bottom:12px; display:none; font-weight:400;
}
.st.loading { background:rgba(77,159,255,.1); color:var(--blue); border:1px solid rgba(77,159,255,.2); }
.st.ok  { background:rgba(0,229,160,.08); color:var(--mint); border:1px solid rgba(0,229,160,.2); }
.st.err { background:rgba(255,92,108,.08); color:var(--red); border:1px solid rgba(255,92,108,.2); }

/* ── Section label ───────────────────────────────────────────────────── */
.fl {
  font-size:11px; font-weight:600; color:var(--text3);
  text-transform:uppercase; letter-spacing:.1em; margin:16px 0 10px;
}

/* ── Form ────────────────────────────────────────────────────────────── */
.fr { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.fg { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
.fg label { font-size:11px; font-weight:500; color:var(--text2); letter-spacing:.03em; text-transform:uppercase; }
.fg input, .fr .fg input {
  font-size:16px; font-weight:500; padding:11px 13px;
  border-radius:var(--rs); border:1px solid var(--border);
  background:var(--card); color:var(--text); width:100%; outline:none;
  font-family:'Outfit',sans-serif; transition:border-color .15s, box-shadow .15s;
}
.fg input:focus { border-color:var(--mint); box-shadow:0 0 0 3px rgba(0,229,160,.1); }
.fg input[readonly] { color:var(--text2); background:var(--bg2); border-color:var(--border); }
.fg input::placeholder { color:var(--text3); font-weight:300; }

/* ── Save button ─────────────────────────────────────────────────────── */
.btn {
  width:100%; padding:15px;
  background:linear-gradient(135deg,var(--mint),var(--mint2));
  color:#0a1a12; border:none; border-radius:var(--rs);
  font-size:15px; font-weight:700; cursor:pointer;
  font-family:'Outfit',sans-serif; margin-top:6px;
  transition:opacity .15s, transform .1s;
  letter-spacing:.01em;
}
.btn:active { opacity:.85; transform:scale(.98); }

/* ── Metric cards ────────────────────────────────────────────────────── */
.mg { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-bottom:20px; }
.mc {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--rs); padding:14px 12px;
  transition:border-color .2s;
}
.mc.primary { border-color:rgba(0,229,160,.25); box-shadow:var(--glow); }
.mc .ml { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
.mc .mv { font-size:20px; font-weight:700; line-height:1; color:var(--text); }
.mc .mu { font-size:11px; font-weight:400; color:var(--text2); }
.mc .md { font-size:11px; margin-top:5px; font-weight:500; }
.up { color:var(--red); } .dn2 { color:var(--mint); } .neu { color:var(--text3); }

/* ── Entry list ──────────────────────────────────────────────────────── */
.hist-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.hist-hdr .sl { margin:0; }
.hist-actions { display:flex; gap:14px; align-items:center; }
.sl { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; }
.el { display:flex; flex-direction:column; gap:8px; }
.er {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 16px; background:var(--card); border:1px solid var(--border);
  border-radius:var(--rs); transition:border-color .15s;
}
.er:hover { border-color:var(--border2); }
.ed { font-size:14px; font-weight:600; }
.et { font-size:11px; color:var(--text3); font-weight:400; margin-left:5px; }
.em { font-size:11px; color:var(--text2); margin-top:3px; font-weight:300; }
.ew { font-size:19px; font-weight:700; text-align:right; color:var(--text); }
.eb { font-size:11px; color:var(--text2); text-align:right; margin-top:2px; }
.ex { background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer; padding:4px 0 4px 12px; line-height:1; transition:color .15s; }
.ex:hover { color:var(--red); }

/* ── Charts ──────────────────────────────────────────────────────────── */
.csr { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.csr label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; }
select {
  font-size:13px; font-weight:500; padding:6px 10px;
  border-radius:7px; border:1px solid var(--border2);
  background:var(--card); color:var(--text); outline:none;
  font-family:'Outfit',sans-serif; cursor:pointer;
}
.cw { position:relative; width:100%; height:220px; margin-bottom:28px; }
.cpw { position:relative; width:100%; height:160px; margin-bottom:16px; }
.comp-hdr { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }

/* ── Empty state ─────────────────────────────────────────────────────── */
.emp { text-align:center; padding:48px 20px; color:var(--text3); font-size:14px; line-height:1.8; }
.emp-icon { font-size:44px; margin-bottom:14px; opacity:.6; }

/* ── Toast ───────────────────────────────────────────────────────────── */
#toast {
  position:fixed; bottom:calc(28px + var(--sb)); left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--bg3); color:var(--text); border:1px solid var(--border2);
  padding:11px 22px; border-radius:20px; font-size:13px; font-weight:500;
  opacity:0; transition:all .22s; pointer-events:none; white-space:nowrap; z-index:300;
  backdrop-filter:blur(12px);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── Spinner ─────────────────────────────────────────────────────────── */
@keyframes spin { to { transform:rotate(360deg); } }
.spin { display:inline-block; width:12px; height:12px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }

/* ── Fade-in on tab switch ───────────────────────────────────────────── */
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.scr.on { animation:fadeUp .18s ease; }

/* ── Crop/Rotate overlay ─────────────────────────────────────────────── */
#cropOv {
  display:none; position:fixed; inset:0; z-index:400;
  background:#0a0b0f; flex-direction:column;
}
#cropOv.open { display:flex; }
.crop-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; padding-top:calc(12px + env(safe-area-inset-top,0px));
  background:#0d0f14; flex-shrink:0; border-bottom:1px solid var(--border);
}
.crop-bar button {
  font-size:13px; font-weight:600; font-family:'Outfit',sans-serif;
  background:none; border:none; cursor:pointer; padding:6px 12px;
  border-radius:7px;
}
#cropCancel { color:var(--text2); }
#cropConfirm { background:var(--mint); color:#0a1a12; }
#cropConfirm:disabled { opacity:.35; cursor:not-allowed; }
.crop-canvas-wrap {
  flex:1; position:relative; overflow:hidden; touch-action:none;
  display:flex; align-items:center; justify-content:center;
}
#cropPhotoCanvas { position:absolute; }
#cropSelCanvas   { position:absolute; inset:0; width:100%; height:100%; }
.crop-tools {
  display:flex; align-items:center; justify-content:center; gap:10px;
  padding:12px 16px; padding-bottom:calc(12px + var(--sb));
  background:#0d0f14; flex-shrink:0; border-top:1px solid var(--border);
}
.crop-tool-btn {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:10px; padding:9px 16px; cursor:pointer;
  font-size:12px; font-weight:500; color:var(--text2);
  font-family:'Outfit',sans-serif; min-width:70px;
}
.crop-tool-btn span { font-size:18px; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-left">
      <h1>Weight</h1>
      <p id="hSub">Loading…</p>
    </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;margin-left:12px;">
        <div style="font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--text);line-height:1;">Jan Balayla</div>
        <div style="width:100%;height:1.5px;background:linear-gradient(90deg,transparent,#8b1a1a,#c0392b);margin-top:3px;border-radius:2px;"></div>
      </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="on" onclick="showTab('log',this)">Log</button>
    <button onclick="showTab('hist',this)">History</button>
    <button onclick="showTab('chrt',this)">Charts</button>
  </div>

  <div class="cnt">

    <!-- ── LOG TAB ── -->
    <div id="tab-log" class="scr on">

      <!-- Height -->
      <div class="ht-bar">
        <span id="htLbl">Set height for auto BMI</span>
        <div>
          <input type="number" id="htIn" step="1" inputmode="numeric" placeholder="cm">
          <button onclick="saveHt()">Save</button>
        </div>
      </div>

      <!-- Gemini key -->
      <details class="api-box" id="geminiBox">
        <summary>
          <span>Gemini API key</span>
          <span id="geminiStatus" style="font-size:11px;font-weight:600;color:var(--text3);">not set</span>
        </summary>
        <div class="inner">
          <input type="password" id="geminiKeyInput" placeholder="AIza…" oninput="saveGeminiKey(this.value)">
          <p>Free at <strong style="color:var(--text2);">aistudio.google.com</strong> → Get API key. 20 reads/day, no credit card needed.</p>
        </div>
      </details>

      <!-- Photo buttons -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div class="photo-btn" style="margin-bottom:0;">
          <input type="file" accept="image/*" capture="environment" onchange="openCropEditor(event)">
          <div class="photo-btn-icon">📷</div>
          <div class="photo-btn-text">
            <strong>Take photo</strong>
            <span>Use camera</span>
          </div>
        </div>
        <div class="photo-btn" style="margin-bottom:0;">
          <input type="file" accept="image/*" onchange="openCropEditor(event)">
          <div class="photo-btn-icon">🖼️</div>
          <div class="photo-btn-text">
            <strong>Pick photo</strong>
            <span>From gallery</span>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div id="stEl" class="st"></div>

      <!-- Form -->
      <div class="fl">Measurements</div>
      <div class="fg">
        <label>Date &amp; time</label>
        <input type="datetime-local" id="fDate">
      </div>
      <div class="fr">
        <div class="fg">
          <label>Weight (kg)</label>
          <input type="number" id="fW" step="0.1" inputmode="decimal" placeholder="—" oninput="updBmi()">
        </div>
        <div class="fg">
          <label>BMI — auto</label>
          <input type="text" id="fBmi" readonly placeholder="—">
        </div>
      </div>
      <div class="fr">
        <div class="fg"><label>Body fat %</label><input type="number" id="fFat" step="0.1" inputmode="decimal" placeholder="—"></div>
        <div class="fg"><label>Muscle %</label><input type="number" id="fMus" step="0.1" inputmode="decimal" placeholder="—"></div>
      </div>
      <div class="fr">
        <div class="fg"><label>Moisture %</label><input type="number" id="fMoi" step="0.1" inputmode="decimal" placeholder="—"></div>
        <div class="fg"><label>Bone mass (kg)</label><input type="number" id="fBon" step="0.01" inputmode="decimal" placeholder="—"></div>
      </div>
      <button class="btn" onclick="saveEntry()">Save entry</button>
    </div>

    <!-- ── HISTORY TAB ── -->
    <div id="tab-hist" class="scr">
      <div id="sMg" class="mg"></div>
      <div class="hist-hdr">
        <div class="sl">All entries</div>
        <div class="hist-actions">
          <label style="font-size:12px;color:var(--mint);cursor:pointer;font-weight:500;position:relative;">
            Import
            <input type="file" accept=".json" onchange="impJSON(event)" style="position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;">
          </label>
          <button onclick="expJSON()" style="font-size:12px;color:var(--text2);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;">Export</button>
          <button onclick="deleteAll()" style="font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;">Delete all</button>
        </div>
      </div>
      <div id="eList" class="el"></div>
    </div>

    <!-- ── CHARTS TAB ── -->
    <div id="tab-chrt" class="scr">
      <div class="csr">
        <label>Metric</label>
        <select id="cMet" onchange="renderCharts()">
          <option value="weight">Weight (kg)</option>
          <option value="bmi">BMI</option>
          <option value="fat">Body fat %</option>
          <option value="muscle">Muscle %</option>
          <option value="moisture">Moisture %</option>
        </select>
      </div>
      <div class="cw"><canvas id="lChart"></canvas></div>
      <div class="comp-hdr">
        <div class="sl" style="margin:0">Composition</div>
        <div id="compDate" style="font-size:11px;color:var(--text3);font-weight:500;"></div>
      </div>
      <div class="cpw"><canvas id="cChart"></canvas></div>
    </div>

  </div>
</div>

<!-- Crop / Rotate overlay -->
<div id="cropOv">
  <div class="crop-bar">
    <button id="cropCancel" onclick="closeCropEditor()">Cancel</button>
    <span style="font-size:13px;color:var(--text2);font-weight:500;">Crop &amp; rotate</span>
    <button id="cropConfirm" onclick="confirmCrop()" disabled>Send to Gemini</button>
  </div>
  <div class="crop-canvas-wrap" id="cropWrap">
    <canvas id="cropPhotoCanvas"></canvas>
    <canvas id="cropSelCanvas"></canvas>
  </div>
  <div class="crop-tools">
    <button class="crop-tool-btn" onclick="rotateImage(-90)"><span>↺</span>Rotate L</button>
    <button class="crop-tool-btn" onclick="rotateImage(90)"><span>↻</span>Rotate R</button>
    <button class="crop-tool-btn" onclick="resetCrop()"><span>⊠</span>Reset crop</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
// ── Storage ───────────────────────────────────────────────────────────
const SK = 'wt_v1', HK = 'wt_ht', GK = 'wt_gemini';
const load = () => { try { return JSON.parse(localStorage.getItem(SK) || '[]'); } catch { return []; } };
const save = a => localStorage.setItem(SK, JSON.stringify(a));
const getHt = () => parseFloat(localStorage.getItem(HK)) || null;
const getGeminiKey = () => localStorage.getItem(GK) || '';

// ── Init ──────────────────────────────────────────────────────────────
document.getElementById('fDate').value = nowDT();
updHtBar(); updBmi(); updSub();
const _k = getGeminiKey();
if (_k) { document.getElementById('geminiKeyInput').value = _k; setGeminiStatus(true); }
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

// ── Helpers ───────────────────────────────────────────────────────────
function nowDT() {
  const n = new Date(), p = x => String(x).padStart(2, '0');
  return `${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}T${p(n.getHours())}:${p(n.getMinutes())}`;
}
function toast(m) {
  const e = document.getElementById('toast');
  e.textContent = m; e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 2200);
}
function setStatus(type, msg) {
  const e = document.getElementById('stEl');
  e.className = 'st ' + type;
  e.innerHTML = type === 'loading' ? `<span class="spin"></span>${msg}` : msg;
  e.style.display = 'block';
}
function clearStatus() { document.getElementById('stEl').style.display = 'none'; }
function fmtDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Tabs ──────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('on'));
  document.getElementById('tab-' + id).classList.add('on');
  btn.classList.add('on');
  if (id === 'hist') renderHist();
  if (id === 'chrt') renderCharts();
}

// ── Header subtitle ───────────────────────────────────────────────────
function updSub() {
  const arr = load(), s = document.getElementById('hSub');
  if (!arr.length) { s.textContent = 'No entries yet'; return; }
  const l = arr[arr.length - 1];
  s.textContent = l.weight ? `Last weigh-in: ${l.weight.toFixed(1)} kg` : `Last entry: ${l.date}`;
}

// ── Height / BMI ──────────────────────────────────────────────────────
function saveHt() {
  const v = parseFloat(document.getElementById('htIn').value);
  if (!v || v < 50 || v > 250) { toast('Enter a valid height (cm)'); return; }
  localStorage.setItem(HK, v);
  updHtBar(); updBmi(); toast('Height saved');
}
function updHtBar() {
  const h = getHt();
  document.getElementById('htLbl').textContent = h ? `Height: ${h} cm` : 'Set height for auto BMI';
  if (h) document.getElementById('htIn').value = h;
}
function updBmi() {
  const w = parseFloat(document.getElementById('fW').value), h = getHt();
  const el = document.getElementById('fBmi');
  el.value = (w && h) ? (w / ((h / 100) ** 2)).toFixed(1) : '';
  el.placeholder = h ? '—' : 'set height';
}

// ── Gemini key ────────────────────────────────────────────────────────
function saveGeminiKey(v) {
  localStorage.setItem(GK, v.trim());
  setGeminiStatus(!!v.trim());
}
function setGeminiStatus(isSet) {
  const el = document.getElementById('geminiStatus');
  el.textContent = isSet ? '✓ set' : 'not set';
  el.style.color = isSet ? 'var(--mint)' : 'var(--text3)';
}

// ── Crop Editor ───────────────────────────────────────────────────────
let _srcImg = null, _rotation = 0, _sel = null, _drag = false, _layout = {};

function openCropEditor(e) {
  const f = e.target.files[0]; if (!f) return; e.target.value = '';
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      _srcImg = img; _rotation = 0; _sel = null;
      document.getElementById('cropOv').classList.add('open');
      document.getElementById('cropConfirm').disabled = true;
      requestAnimationFrame(initCropCanvas);
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

function getRotatedSize(w, h, deg) {
  const r = deg * Math.PI / 180;
  return {
    w: Math.round(Math.abs(w * Math.cos(r)) + Math.abs(h * Math.sin(r))),
    h: Math.round(Math.abs(w * Math.sin(r)) + Math.abs(h * Math.cos(r)))
  };
}

function initCropCanvas() {
  const wrap = document.getElementById('cropWrap');
  const pc = document.getElementById('cropPhotoCanvas');
  const sc = document.getElementById('cropSelCanvas');
  const maxW = wrap.clientWidth, maxH = wrap.clientHeight;

  const rs = getRotatedSize(_srcImg.width, _srcImg.height, _rotation);
  const scale = Math.min(maxW / rs.w, maxH / rs.h, 1);
  const dw = Math.round(rs.w * scale), dh = Math.round(rs.h * scale);

  pc.width = dw; pc.height = dh;
  pc.style.width = dw + 'px'; pc.style.height = dh + 'px';
  pc.style.left = ((maxW - dw) / 2) + 'px';
  pc.style.top  = ((maxH - dh) / 2) + 'px';

  sc.style.left = pc.style.left; sc.style.top = pc.style.top;
  sc.style.width = dw + 'px'; sc.style.height = dh + 'px';
  sc.width = dw; sc.height = dh;

  _layout = { scale, dw, dh, offX: (maxW - dw) / 2, offY: (maxH - dh) / 2 };

  // Draw rotated image
  const ctx = pc.getContext('2d');
  ctx.clearRect(0, 0, dw, dh);
  ctx.save();
  ctx.translate(dw / 2, dh / 2);
  ctx.rotate(_rotation * Math.PI / 180);
  ctx.drawImage(_srcImg, -_srcImg.width * scale / 2, -_srcImg.height * scale / 2,
    _srcImg.width * scale, _srcImg.height * scale);
  ctx.restore();

  // Reattach events
  sc.onmousedown = sc.ontouchstart = selStart;
  sc.onmousemove = sc.ontouchmove  = selMove;
  sc.onmouseup   = sc.ontouchend   = selEnd;
  drawSel();
}

function getEvPos(e) {
  const sc = document.getElementById('cropSelCanvas');
  const rect = sc.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * (sc.width / rect.width),
    y: (src.clientY - rect.top)  * (sc.height / rect.height)
  };
}
function selStart(e) { e.preventDefault(); _drag = true; const p = getEvPos(e); _sel = { x1:p.x,y1:p.y,x2:p.x,y2:p.y }; drawSel(); }
function selMove(e)  { e.preventDefault(); if (!_drag || !_sel) return; const p = getEvPos(e); _sel.x2=p.x; _sel.y2=p.y; drawSel(); }
function selEnd(e)   {
  e.preventDefault(); _drag = false;
  if (_sel && Math.abs(_sel.x2-_sel.x1) > 8 && Math.abs(_sel.y2-_sel.y1) > 8) {
    document.getElementById('cropConfirm').disabled = false;
  }
  drawSel();
}

function drawSel() {
  const sc = document.getElementById('cropSelCanvas');
  const ctx = sc.getContext('2d');
  ctx.clearRect(0, 0, sc.width, sc.height);
  if (!_sel) return;
  const x = Math.min(_sel.x1, _sel.x2), y = Math.min(_sel.y1, _sel.y2);
  const w = Math.abs(_sel.x2 - _sel.x1), h = Math.abs(_sel.y2 - _sel.y1);
  // Dim outside
  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.fillRect(0, 0, sc.width, sc.height);
  ctx.clearRect(x, y, w, h);
  // Border
  ctx.strokeStyle = '#00e5a0';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);
  // Rule-of-thirds grid
  ctx.strokeStyle = 'rgba(0,229,160,.25)';
  ctx.lineWidth = .5;
  for (let i = 1; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(x + w*i/3, y); ctx.lineTo(x + w*i/3, y+h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y + h*i/3); ctx.lineTo(x+w, y + h*i/3); ctx.stroke();
  }
  // Corner handles
  const hs = 10;
  ctx.fillStyle = '#00e5a0';
  [[x,y],[x+w-hs,y],[x,y+h-hs],[x+w-hs,y+h-hs]].forEach(([cx,cy]) => ctx.fillRect(cx,cy,hs,hs));
}

function rotateImage(deg) {
  _rotation = (_rotation + deg + 360) % 360;
  _sel = null;
  document.getElementById('cropConfirm').disabled = true;
  initCropCanvas();
}

function resetCrop() {
  _sel = null;
  document.getElementById('cropConfirm').disabled = true;
  drawSel();
}

function closeCropEditor() {
  document.getElementById('cropOv').classList.remove('open');
  _srcImg = null; _sel = null; _rotation = 0;
}

function confirmCrop() {
  if (!_sel || !getGeminiKey()) {
    if (!getGeminiKey()) { setStatus('err', 'Add your Gemini API key first'); document.getElementById('geminiBox').open = true; }
    closeCropEditor(); return;
  }
  const x = Math.round(Math.min(_sel.x1, _sel.x2));
  const y = Math.round(Math.min(_sel.y1, _sel.y2));
  const w = Math.round(Math.abs(_sel.x2 - _sel.x1));
  const h = Math.round(Math.abs(_sel.y2 - _sel.y1));
  // Render cropped region from the already-rotated photo canvas
  const pc = document.getElementById('cropPhotoCanvas');
  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  out.getContext('2d').drawImage(pc, x, y, w, h, 0, 0, w, h);
  const dataUrl = out.toDataURL('image/jpeg', 0.92);
  closeCropEditor();
  setStatus('loading', 'Reading your scale…');
  readWithGemini(dataUrl);
}

async function readWithGemini(dataUrl) {
  const key = getGeminiKey();
  const base64 = dataUrl.split(',')[1];
  const mime = dataUrl.split(';')[0].split(':')[1];
  const prompt = `You are reading a 7-segment display smart scale screen.
Screen layout:
- TOP LEFT: body fat %
- BOTTOM LEFT: muscle %
- TOP RIGHT: moisture (body water) %
- CENTER LARGE: weight in kg
- May also show bone mass in kg

Return ONLY a JSON object — no extra text, no markdown — with these keys (number or null):
{"weight":null,"body_fat_rate":null,"muscle_rate":null,"moisture_rate":null,"bone_mass":null}`;
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [
          { inline_data: { mime_type: mime, data: base64 } },
          { text: prompt }
        ]}]})
      }
    );
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const match = text.match(/\{[\s\S]*?\}/);
    if (!match) throw new Error('No JSON in response');
    const vals = JSON.parse(match[0]);
    const fields = { weight: 'fW', body_fat_rate: 'fFat', muscle_rate: 'fMus', moisture_rate: 'fMoi', bone_mass: 'fBon' };
    let filled = 0;
    for (const [k, id] of Object.entries(fields)) {
      if (vals[k] != null) { document.getElementById(id).value = parseFloat(vals[k]).toFixed(1); filled++; }
    }
    updBmi();
    filled > 0
      ? setStatus('ok', `Read ${filled} values — review and save`)
      : setStatus('err', 'No values found — try a clearer photo');
  } catch (err) {
    setStatus('err', err.message);
  }
}

// ── Save entry ────────────────────────────────────────────────────────
function saveEntry() {
  const dt = document.getElementById('fDate').value || nowDT();
  const dk = dt.slice(0, 10);
  const w = parseFloat(document.getElementById('fW').value) || null;
  const h = getHt();
  const bmi = (w && h) ? parseFloat((w / ((h / 100) ** 2)).toFixed(2)) : null;
  const entry = {
    date: dk, datetime: dt, weight: w, bmi,
    fat:      parseFloat(document.getElementById('fFat').value) || null,
    muscle:   parseFloat(document.getElementById('fMus').value) || null,
    moisture: parseFloat(document.getElementById('fMoi').value) || null,
    bone:     parseFloat(document.getElementById('fBon').value) || null,
  };
  if (!entry.weight) { toast('Enter weight'); return; }
  const arr = load();
  const idx = arr.findIndex(e => e.date === dk);
  if (idx >= 0) arr[idx] = entry; else arr.push(entry);
  arr.sort((a, b) => (a.datetime || a.date).localeCompare(b.datetime || b.date));
  save(arr);
  ['fW', 'fFat', 'fMus', 'fMoi', 'fBon'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fBmi').value = '';
  document.getElementById('fDate').value = nowDT();
  clearStatus(); updSub(); toast('Entry saved!');
}

// ── History ───────────────────────────────────────────────────────────
function renderHist() {
  const arr = load();
  const le = document.getElementById('eList'), mg = document.getElementById('sMg');
  if (!arr.length) {
    mg.innerHTML = '';
    le.innerHTML = '<div class="emp"><div class="emp-icon">⚖️</div>No entries yet.<br>Log your first weigh-in.</div>';
    return;
  }
  const l = arr[arr.length - 1], p = arr.length > 1 ? arr[arr.length - 2] : null;
  function delta(k) {
    if (!p || l[k] == null || p[k] == null) return '';
    const d = l[k] - p[k];
    if (Math.abs(d) < 0.01) return `<div class="md neu">no change</div>`;
    return `<div class="md ${d > 0 ? 'up' : 'dn2'}">${d > 0 ? '+' : ''}${d.toFixed(1)}</div>`;
  }
  mg.innerHTML = `
    <div class="mc primary">
      <div class="ml">Weight</div>
      <div class="mv">${l.weight != null ? l.weight.toFixed(1) : '—'}<span class="mu"> kg</span></div>
      ${delta('weight')}
    </div>
    <div class="mc">
      <div class="ml">Body fat</div>
      <div class="mv">${l.fat != null ? l.fat.toFixed(1) : '—'}<span class="mu"> %</span></div>
      ${delta('fat')}
    </div>
    <div class="mc">
      <div class="ml">BMI</div>
      <div class="mv">${l.bmi != null ? l.bmi.toFixed(1) : '—'}</div>
      ${delta('bmi')}
    </div>`;
  le.innerHTML = [...arr].reverse().map(e => `
    <div class="er">
      <div>
        <div class="ed">${fmtDate(e.date)}<span class="et">${e.datetime && e.datetime.length > 10 ? e.datetime.slice(11,16) : ''}</span></div>
        <div class="em">${[e.fat != null ? `fat ${e.fat}%` : '', e.muscle != null ? `muscle ${e.muscle}%` : ''].filter(Boolean).join(' · ') || 'no composition data'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;">
        <div>
          <div class="ew">${e.weight != null ? e.weight.toFixed(1) + ' kg' : '—'}</div>
          <div class="eb">BMI ${e.bmi != null ? e.bmi.toFixed(1) : '—'}</div>
        </div>
        <button class="ex" onclick="delEntry('${e.date}')">×</button>
      </div>
    </div>`).join('');
}
function delEntry(d) {
  if (!confirm(`Delete entry for ${d}?`)) return;
  save(load().filter(e => e.date !== d));
  updSub(); renderHist();
}

// ── Import / Export ───────────────────────────────────────────────────
function deleteAll() {
  if (!confirm('Delete all entries? This cannot be undone.')) return;
  save([]); updSub(); renderHist(); toast('All data deleted');
}
function impJSON(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const inc = JSON.parse(ev.target.result);
      if (!Array.isArray(inc)) throw new Error('Expected array');
      const map = {};
      load().forEach(en => map[en.date] = en);
      inc.forEach(en => { if (en.date) map[en.date] = en; });
      save(Object.values(map).sort((a, b) => (a.datetime || a.date).localeCompare(b.datetime || b.date)));
      updSub(); renderHist(); toast(`Imported ${inc.length} entries`);
    } catch (err) { toast('Import failed: ' + err.message); }
    e.target.value = '';
  };
  r.readAsText(f);
}
function expJSON() {
  const b = new Blob([JSON.stringify(load(), null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = 'weight-data.json'; a.click();
}

// ── Charts ────────────────────────────────────────────────────────────
let lInst = null, cInst = null;
const metColors = {
  weight:   { line: '#00e5a0', fill: 'rgba(0,229,160,.07)',   point: '#00e5a0' },
  bmi:      { line: '#4d9fff', fill: 'rgba(77,159,255,.07)',  point: '#4d9fff' },
  fat:      { line: '#ff5c6c', fill: 'rgba(255,92,108,.07)',  point: '#ff5c6c' },
  muscle:   { line: '#ffb340', fill: 'rgba(255,179,64,.07)',  point: '#ffb340' },
  moisture: { line: '#b07cff', fill: 'rgba(176,124,255,.07)', point: '#b07cff' },
};
function renderCharts() {
  const arr = load(), met = document.getElementById('cMet').value;
  const keyMap = { weight: 'weight', bmi: 'bmi', fat: 'fat', muscle: 'muscle', moisture: 'moisture' };
  if (lInst) { lInst.destroy(); lInst = null; }
  if (cInst) { cInst.destroy(); cInst = null; }
  const fl = arr.filter(e => e[keyMap[met]] != null);
  if (!fl.length) return;
  const gc = 'rgba(255,255,255,.05)', tc = '#454a60';
  lInst = new Chart(document.getElementById('lChart'), {
    type: 'line',
    data: { datasets: [{ data: fl.map(e => ({ x: new Date(e.date + 'T12:00:00'), y: e[keyMap[met]] })),
      borderColor: metColors[met].line, backgroundColor: metColors[met].fill,
      borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      pointBackgroundColor: metColors[met].point, pointBorderColor: '#0d0f14', pointBorderWidth: 2,
      fill: true, tension: .4 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { type: 'time',
          time: { unit: fl.length <= 14 ? 'day' : 'month', displayFormats: { day: 'MMM d', month: "MMM ''yy" }, tooltipFormat: 'MMM d, yyyy' },
          grid: { color: gc }, border: { display: false },
          ticks: { color: tc, font: { size: 11, family: 'Outfit' }, maxRotation: 0, autoSkip: true, maxTicksLimit: 6 } },
        y: { grid: { color: gc }, border: { display: false },
          ticks: { color: tc, font: { size: 11, family: 'Outfit' } } }
      }
    }
  });
  const lat = arr[arr.length - 1];
  const cd = [
    { label: 'Fat',      val: lat.fat,      color: '#ff5c6c' },
    { label: 'Muscle',   val: lat.muscle,   color: '#00e5a0' },
    { label: 'Moisture', val: lat.moisture, color: '#4d9fff' },
  ].filter(d => d.val != null);
  const cdEl = document.getElementById('compDate');
  if (cdEl) cdEl.textContent = lat.date ? fmtDate(lat.date) : '';
  if (cd.length) {
    cInst = new Chart(document.getElementById('cChart'), {
      type: 'bar',
      data: { labels: cd.map(d => d.label), datasets: [{ data: cd.map(d => d.val), backgroundColor: cd.map(d => d.color), borderRadius: 6, borderSkipped: false }] },
      options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: gc }, border: { display: false }, ticks: { color: tc, font: { size: 11, family: 'Outfit' } }, max: 100 },
          y: { grid: { display: false }, border: { display: false }, ticks: { color: '#7a7f96', font: { size: 12, family: 'Outfit', weight: '500' } } }
        }
      }
    });
  }
}
